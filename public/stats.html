<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USD/NIS — LnkStash Stats</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2314d09a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='700' font-size='15' fill='%23000'>Ls</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0d0d0f; --bg-card:#161719; --bg-card-hover:#1c1e21;
    --border:#242628; --teal:#14d09a; --teal-glow:rgba(20,208,154,0.12);
    --text-primary:#e8eaed; --text-secondary:#7a7e85; --text-muted:#4a4e55;
    --green:#14d09a; --red:#f03e3e; --yellow:#ffd43b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Mono',monospace; background:var(--bg); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(20,208,154,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(20,208,154,0.025) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  .wrap { max-width:900px; margin:0 auto; padding:24px 20px 60px; position:relative; z-index:1; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
  .back-btn { display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--border); border-radius:7px; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; font-size:11px; padding:6px 12px; cursor:pointer; text-decoration:none; transition:all .15s; }
  .back-btn:hover { border-color:var(--teal); color:var(--teal); }
  .header-title { font-size:12px; color:var(--text-muted); }

  /* TICKER HERO */
  .ticker-hero { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:28px 32px; margin-bottom:20px; position:relative; overflow:hidden; }
  .ticker-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--teal-glow),transparent); }
  .ticker-pair { font-size:11px; color:var(--text-muted); letter-spacing:.1em; margin-bottom:8px; }
  .ticker-rate { font-size:56px; font-weight:700; letter-spacing:-2px; line-height:1; margin-bottom:6px; transition:color .3s; }
  .ticker-rate.up { color:var(--green); }
  .ticker-rate.down { color:var(--red); }
  .ticker-rate.neutral { color:var(--text-primary); }
  .ticker-change { display:flex; align-items:center; gap:12px; font-size:13px; }
  .change-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:12px; font-weight:600; }
  .change-badge.up { background:rgba(20,208,154,.12); color:var(--green); border:1px solid rgba(20,208,154,.25); }
  .change-badge.down { background:rgba(240,62,62,.12); color:var(--red); border:1px solid rgba(240,62,62,.25); }
  .ticker-meta { margin-top:16px; display:flex; gap:24px; flex-wrap:wrap; }
  .ticker-meta-item { font-size:11px; color:var(--text-muted); }
  .ticker-meta-item span { color:var(--text-secondary); display:block; font-size:13px; margin-top:2px; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--teal); box-shadow:0 0 8px var(--teal); animation:pulse 2s infinite; display:inline-block; margin-right:6px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* CHART SECTION */
  .chart-section { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:20px 24px; margin-bottom:20px; }
  .chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .chart-title { font-size:12px; color:var(--text-secondary); }
  .period-btns { display:flex; gap:4px; }
  .period-btn { background:none; border:1px solid var(--border); border-radius:5px; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; font-size:10px; padding:4px 10px; cursor:pointer; transition:all .15s; }
  .period-btn:hover { border-color:var(--text-muted); color:var(--text-primary); }
  .period-btn.active { border-color:var(--teal); color:var(--teal); background:var(--teal-glow); }
  .chart-wrap { position:relative; height:220px; }

  /* STATS GRID */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
  .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .stat-label { font-size:10px; color:var(--text-muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
  .stat-value { font-size:20px; font-weight:600; color:var(--text-primary); }
  .stat-sub { font-size:10px; color:var(--text-muted); margin-top:3px; }

  /* LAST UPDATED */
  .last-updated { text-align:center; font-size:11px; color:var(--text-muted); margin-top:8px; }

  /* LOADING */
  .loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--text-muted); font-size:12px; gap:10px; }
  .loading-dots { display:flex; gap:5px; }
  .loading-dot { width:5px; height:5px; border-radius:50%; background:var(--teal); animation:ldot 1.2s infinite; }
  .loading-dot:nth-child(2){animation-delay:.2s} .loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes ldot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  .error-msg { text-align:center; padding:20px; color:var(--text-muted); font-size:12px; }

  @media (max-width:600px) {
    .ticker-rate { font-size:40px; }
    .wrap { padding:16px 14px 80px; }
    .ticker-hero { padding:20px; }
    .chart-section { padding:16px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <a href="/" class="back-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2L4 6l4 4"/></svg>
      Back
    </a>
    <div class="header-title">// stats</div>
  </div>

  <!-- TICKER HERO -->
  <div class="ticker-hero" id="tickerHero">
    <div class="ticker-pair">USD / ILS</div>
    <div class="ticker-rate neutral" id="tickerRate">
      <div class="loading"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
    </div>
    <div class="ticker-change" id="tickerChange"></div>
    <div class="ticker-meta" id="tickerMeta"></div>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- CHART -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title"><span class="live-dot"></span>USD/ILS Historical</div>
      <div class="period-btns">
        <button class="period-btn active" onclick="loadChart(7,this)">1W</button>
        <button class="period-btn" onclick="loadChart(30,this)">1M</button>
        <button class="period-btn" onclick="loadChart(90,this)">3M</button>
        <button class="period-btn" onclick="loadChart(365,this)">1Y</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="rateChart"></canvas>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

</div>

<script>
let chart = null;
let currentRate = null;
let prevRate = null;

// ── FETCH LIVE RATE ──────────────────────────────────────────
async function fetchRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    if (data.result === 'success') {
      return { rate: data.rates.ILS, time: data.time_last_update_utc };
    }
  } catch(e) {}
  // Fallback API
  try {
    const res2 = await fetch('https://api.frankfurter.app/latest?from=USD&to=ILS');
    const data2 = await res2.json();
    return { rate: data2.rates.ILS, time: new Date().toUTCString() };
  } catch(e) {}
  return null;
}

async function updateTicker() {
  const data = await fetchRate();
  if (!data) {
    document.getElementById('tickerRate').innerHTML = '<div class="error-msg">Failed to load rate</div>';
    return;
  }

  prevRate = currentRate;
  currentRate = data.rate;
  const change = prevRate ? currentRate - prevRate : 0;
  const changePct = prevRate ? ((change / prevRate) * 100) : 0;
  const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';

  // Rate display
  const rateEl = document.getElementById('tickerRate');
  rateEl.textContent = currentRate.toFixed(4);
  rateEl.className = 'ticker-rate ' + dir;

  // Change badge
  const changeEl = document.getElementById('tickerChange');
  if (prevRate) {
    const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '—';
    changeEl.innerHTML = `
      <span class="change-badge ${dir}">${arrow} ${Math.abs(change).toFixed(4)} (${Math.abs(changePct).toFixed(3)}%)</span>
      <span style="color:var(--text-muted);font-size:11px">since last check</span>`;
  }

  // Meta
  document.getElementById('tickerMeta').innerHTML = `
    <div class="ticker-meta-item">Base<span>1 USD</span></div>
    <div class="ticker-meta-item">Quote<span>${currentRate.toFixed(4)} ILS</span></div>
    <div class="ticker-meta-item">Inverse<span>${(1/currentRate).toFixed(6)} USD</span></div>
  `;

  // Stats grid
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Current Rate</div>
      <div class="stat-value">${currentRate.toFixed(4)}</div>
      <div class="stat-sub">ILS per 1 USD</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Inverse</div>
      <div class="stat-value">${(1/currentRate).toFixed(6)}</div>
      <div class="stat-sub">USD per 1 ILS</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">100 USD</div>
      <div class="stat-value">${(currentRate * 100).toFixed(2)}</div>
      <div class="stat-sub">ILS</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">1,000 ILS</div>
      <div class="stat-value">${(1000 / currentRate).toFixed(2)}</div>
      <div class="stat-sub">USD</div>
    </div>
  `;

  // Last updated
  document.getElementById('lastUpdated').textContent = '⏱ Last updated: ' + new Date().toLocaleTimeString();
}

// ── HISTORICAL CHART ─────────────────────────────────────────
async function loadChart(days, btnEl) {
  // Update active button
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - days);
  const fmt = d => d.toISOString().split('T')[0];

  try {
    const res = await fetch(`https://api.frankfurter.app/${fmt(start)}..${fmt(end)}?from=USD&to=ILS`);
    const data = await res.json();
    const labels = Object.keys(data.rates);
    const values = labels.map(d => data.rates[d].ILS);
    renderChart(labels, values);
  } catch(e) {
    console.error('Chart error:', e);
  }
}

function renderChart(labels, values) {
  const ctx = document.getElementById('rateChart').getContext('2d');
  if (chart) chart.destroy();

  const min = Math.min(...values);
  const max = Math.max(...values);
  const firstVal = values[0];
  const lastVal = values[values.length - 1];
  const isUp = lastVal >= firstVal;
  const lineColor = isUp ? '#14d09a' : '#f03e3e';

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: lineColor,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: lineColor,
        fill: true,
        backgroundColor: (ctx) => {
          const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, 220);
          gradient.addColorStop(0, isUp ? 'rgba(20,208,154,0.18)' : 'rgba(240,62,62,0.18)');
          gradient.addColorStop(1, 'rgba(0,0,0,0)');
          return gradient;
        },
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1e21',
          borderColor: '#242628',
          borderWidth: 1,
          titleColor: '#7a7e85',
          bodyColor: '#e8eaed',
          titleFont: { family: 'IBM Plex Mono', size: 10 },
          bodyFont: { family: 'IBM Plex Mono', size: 13, weight: '600' },
          callbacks: {
            title: items => items[0].label,
            label: item => ' ' + item.raw.toFixed(4) + ' ILS'
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: {
            color: '#4a4e55', font: { family: 'IBM Plex Mono', size: 10 },
            maxTicksLimit: 6,
            maxRotation: 0
          },
          border: { color: '#242628' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#4a4e55', font: { family: 'IBM Plex Mono', size: 10 },
            callback: v => v.toFixed(3)
          },
          border: { color: '#242628' },
          min: min * 0.998,
          max: max * 1.002
        }
      }
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  await updateTicker();
  loadChart(7, document.querySelector('.period-btn.active'));
  // Refresh rate every 60 seconds
  setInterval(updateTicker, 60000);
}

init();
</script>
</body>
</html>
